APP_CLIENT_ID: 669db109-2dbb-4c4c-93cd-cbc6aa2ef1a4
LOCAL_AUTH: https://dolly-auth-local.intern.dev.nav.no
PROVIDER_URL: https://login.microsoftonline.com
TENENT_ID: nav.no

spring:
  config:
    import: "classpath:dolly-application.yml"
  security:
    oauth2:
      resourceserver:
        aad:
          AZURE_APP_CLIENT_ID: ${APP_CLIENT_ID}
          AZURE_APP_WELL_KNOWN_URL: ${LOCAL_AUTH}/entraid/.well-known/openid-configuration
          AZURE_OPENID_CONFIG_TOKEN_ENDPOINT: ${LOCAL_AUTH}/entraid/oauth2/token
          AZURE_OPENID_CONFIG_ISSUER: ${PROVIDER_URL}/${TENENT_ID}/v2.0
          AZURE_OPENID_CONFIG_JWKS_URI: ${PROVIDER_URL}/${TENENT_ID}/discovery/v2.0/keys
          issuer-uri: ${PROVIDER_URL}/62366534-1ec3-4962-8869-9b5535279d0b/v2.0
          accepted-audience: ${APP_CLIENT_ID}, api:// ${APP_CLIENT_ID}
        tokenx:
          issuer-uri: ${TOKEN_X_ISSUER}

consumers:
  testnorge-profil-api:
    cluster: dev-gcp
    namespace: dolly
    name: testnorge-profil-api-dev
    url: http://testnorge-profil-api-dev.dolly.svc.cluster.local/api
  testnav-app-tilgang-analyse-service:
    cluster: dev-gcp
    namespace: dolly
    name: testnav-app-tilgang-analyse-service
    url: http://testnav-app-tilgang-analyse-service.dolly.svc.cluster.local
  testnav-altinn3-tilgang-service:
    cluster: dev-gcp
    namespace: dolly
    name: testnav-altinn3-tilgang-service
    url: http://testnav-altinn3-tilgang-service.dolly.svc.cluster.local
  testnav-bruker-service:
    cluster: dev-gcp
    namespace: dolly
    name: testnav-bruker-service-dev
    url: http://testnav-bruker-service-dev.dolly.svc.cluster.local

logging:
  level:
    org.springframework.boot.autoconfigure.security.reactive.ReactiveUserDetailsServiceAutoConfiguration: OFF
