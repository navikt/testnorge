apiVersion: "nais.io/v1alpha1"
kind: "Application"
metadata:
  name: testnorge-synt-tiltak-service
  namespace: dolly
  labels:
    team: dolly
spec:
  image: {{ image }}
  azure:
    application:
      enabled: true
  port: 8080
  tracing:
    enabled: true
  accessPolicy:
    inbound:
      rules:
        - application: dolly-frontend-dev
          namespace: dolly
          cluster: dev-fss
        - application: dolly-frontend
          namespace: dolly
          cluster: dev-fss
        - application: dolly-backend
          namespace: dolly
          cluster: dev-fss
        - application: dolly-backend-dev
          namespace: dolly
          cluster: dev-fss
    outbound:
      rules:
        - application: arena-forvalteren
          cluster: dev-fss
        - application: synthdata-arena-tiltak
          namespace: q2
          cluster: dev-fss
  liveness:
    path: /internal/isAlive
    initialDelay: 4
    periodSeconds: 5
    failureThreshold: 500
  readiness:
    path: /internal/isReady
    initialDelay: 4
    periodSeconds: 5
    failureThreshold: 500
  replicas:
    min: 1
    max: 1
  vault:
    enabled: true
  resources:
    requests:
      cpu: 200m
      memory: 4000Mi
    limits:
      cpu: 500m
      memory: 5000Mi
  ingresses:
    - "https://testnorge-synt-tiltak-service.dev.intern.nav.no"
    - "https://testnorge-synt-tiltak-service.dev.adeo.nav.no"