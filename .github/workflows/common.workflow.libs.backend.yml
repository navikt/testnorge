on:
  workflow_call:
    inputs:
      sonar-enabled:
        type: boolean
        description: "Whether to run SonarQube analysis or not."
        required: false
        default: true
      working-directory:
        type: string
        description: "The working directory for the job, e.g. libs/commands (without leading/trailing slash)."
        required: true
    secrets:
      NAV_TOKEN:
        required: true
      SONAR_TOKEN:
        required: true

jobs:

  start:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: "Logging"
        run: |
          echo "branch: ${{ github.ref }}"
          echo "inputs: ${{ toJSON(inputs) }}"
          echo "env: ${{ toJSON(env) }}"
          echo "commit: ${{ github.event.head.commit_message }}"
    outputs:
      artifact: ${{ github.run_id }}-failure

  build:
    needs: start
    if: ${{ github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: ${{ inputs.sonar-enabled && 0 || 1 }}
      - name: "Setup"
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: 21
      - name: "Gradle"
        id: gradle
        uses: gradle/actions/setup-gradle@748248ddd2a24f49513d8f472f81c3a07d4d50e1 # v4.4.4
        with:
          cache-read-only: false
      - name: "Build"
        working-directory: ${{ inputs.working-directory }}
        run: ./gradlew build ${{ inputs.sonar-enabled && 'jacocoTestReport sonar' || '' }} --scan
        env:
          NAV_TOKEN: ${{ secrets.NAV_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - name: "Reporting"
        if: failure() && steps.gradle.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ needs.start.outputs.artifact}}
          path: ${{ inputs.working-directory }}/build/reports
          retention-days: 7