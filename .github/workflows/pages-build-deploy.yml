name: GitHub Pages

on:
  push:
    paths:
      - 'docs/**'
      - 'scripts/generate_proxy_table.py'
  schedule:
    - cron: '15 5 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.x'

      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: "latest"

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml

      - name: Cache Antora
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: docs/.antora-cache
          key: ${{ runner.os }}-antora-${{ hashFiles('docs/antora-playbook.yml', 'docs/antora.yml', 'docs/modules/**', 'docs/supplemental-ui/**') }}
          restore-keys: |
            ${{ runner.os }}-antora-

      - name: Clean previous output
        run: rm -rf docs/public docs/build

      - name: Install dependencies
        working-directory: docs
        run: pnpm install --frozen-lockfile

      - name: Antora version
        working-directory: docs
        run: pnpm exec antora --version

      - name: Build Antora site (clean)
        working-directory: docs
        run: pnpm run build:clean

      - name: Debug site output listing
        run: |
          echo "Listing docs/public (expect index.html):"
          ls -al docs/public || true
          echo "Find component directory contents:" 
          ls -al docs/public/testnav || true
          test -f docs/public/index.html || (echo 'Missing docs/public/index.html after build' && exit 1)

      - name: Add .nojekyll
        run: echo > docs/public/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: docs/public

      - name: Summary
        run: |
          echo "Antora site built and index.html present." >> $GITHUB_STEP_SUMMARY

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
