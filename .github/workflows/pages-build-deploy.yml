name: GitHub Pages

on:
  push:
    paths:
      - 'docs/**'
      - 'scripts/generate_proxy_table.py'
  schedule:
    - cron: '15 5 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.x'

      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: "latest"

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml

      - name: Cache Antora
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: docs/.antora-cache
          key: ${{ runner.os }}-antora-${{ hashFiles('docs/antora-playbook.yml', 'docs/antora.yml', 'docs/modules/**', 'docs/supplemental-ui/**') }}
          restore-keys: |
            ${{ runner.os }}-antora-

      - name: Clean previous output
        run: rm -rf docs/public docs/build

      - name: Install dependencies
        working-directory: docs
        run: pnpm install --frozen-lockfile

      - name: Antora version
        working-directory: docs
        run: pnpm exec antora --version

      - name: Build Antora site (clean)
        working-directory: docs
        run: pnpm run build:clean

      - name: Debug site output listing
        run: |
          echo "Listing docs/public (expect index.html):"
          ls -al docs/public || true
          echo "Find component directory contents:" 
          ls -al docs/public/testnav || true
          test -f docs/public/index.html || (echo 'Missing docs/public/index.html after build' && exit 1)

      - name: Add .nojekyll
        run: echo > docs/public/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: docs/public

      - name: Summary
        run: |
          echo "Antora site built and index.html present." >> $GITHUB_STEP_SUMMARY

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
