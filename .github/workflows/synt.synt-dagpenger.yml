name: synt-dagpenger

on:
  push:
    paths:
      - .github/workflows/synt.synt-dagpenger.yml
      - synt/synt-dagpenger/**
      - libs/testing/**
      - libs/texas/**
      - plugins/**

jobs:
  workflow:
    uses: ./.github/workflows/common.workflow.backend.yml
    with:
      working-directory: "synt/synt-dagpenger"
      deploy-tag: "#deploy-synt-dagpenger"
    permissions:
      contents: read
      id-token: write
    secrets: inherit
