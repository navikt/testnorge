on:
  workflow_call:
    inputs:
      working-directory:
        type: string
        required: true
      healthcheck:
        type: string
        required: true
    secrets:
      NAV_TOKEN:
        required: true
  workflow_dispatch:

jobs:
  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: "Git"
        run: git fetch --unshallow
      - name: "Java"
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          java-version: 21
          distribution: 'temurin'
      - name: "Gradle"
        uses: gradle/actions/setup-gradle@748248ddd2a24f49513d8f472f81c3a07d4d50e1 # v4.4.4
        with:
          cache-read-only: false
      - name: "Auth"
        uses: nais/login@c88ada9ce583928e1c84d2fd5c45cfacdd18d5de # v0
        with:
          team: dolly
      - name: "Build"
        env:
          NAV_TOKEN: ${{ secrets.NAV_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ secrets.GITHUB_USERNAME }}
        run: ./gradlew assemble --scan
      - name: "Start docker containers"
        run: |
          JWK=$(cat ./mocks/jwk.json) docker compose up --build --detach
      - name: "Health check"
        timeout-minutes: 5
        run: |
          echo Wait on service...
          bash -c 'while [[ "$(curl --connect-timeout 2 -s -o /dev/null -w ''%{http_code}'' ${{ inputs.healthcheck }})" != "200" ]]; do echo ...; sleep 5; done; echo Service is up;'
      - name: "Run integration tests"
        uses: gradle/actions/setup-gradle@748248ddd2a24f49513d8f472f81c3a07d4d50e1 # v4.4.4
        with:
          cache-read-only: false
      - name: "Build"
        working-directory: ${{ inputs.working-directory }}
        run: ./gradlew iTest --scan
      - name: "Stop docker containers"
        run: |
          docker compose down --remove-orphans --volumes