apiVersion: "nais.io/v1alpha1"
kind: "Application"
metadata:
  name: synthdata-arena-meldekort
  namespace: dolly
  labels:
    team: dolly
  annotations:
    nais.io/run-as-user: "65532" # The nonroot user.
spec:
  image: {{image}}
  liveness:
    path: "/internal/health/liveness"
    port: 8080
    initialDelay: 30
  readiness:
    path: "/internal/health/readiness"
    port: 8080
    initialDelay: 30
  prometheus:
    enabled: true
    path: "/internal/metrics"
  replicas:
    min: 1
    max: 1
  resources:
    requests:
      cpu: 300m
      memory: 512Mi
    limits:
      memory: 2048Mi
  azure:
    application:
      allowAllUsers: true
      enabled: true
      tenant: nav.no
  accessPolicy:
    inbound:
      rules:
        - application: team-dolly-lokal-app
        - application: testnav-oversikt-frontend
        - application: testnav-synthdata-meldekort-proxy-nav
    outbound:
      rules:
        - application: logging
          namespace: nais-system
  env:
    - name: SPRING_PROFILES_ACTIVE
      value: prod
  gcp:
    buckets:
      - name: synthdata-meldekort-model-bucket
  ingresses:
    - "https://synthdata-arena-meldekort.intern.dev.nav.no"

