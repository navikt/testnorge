openapi: 3.0.0

info:
  title: Syntetisering - Meldekort
  description: |-
    APIet genererer meldekort i XML format som kan settes inn i arena. Merk at denne metoden genererer kun bodyen
    til XML-meldingen til et meldekort, og er avhengig av å få satt på et hode for at denne kan legges inn i Arena.
    Applikasjonen genererer syntetiske meldekort for en spesifikk meldegruppe
  version: '1.0'
  termsOfService: https://www.nav.no/
  contact:
    name: Team Dolly
    url: slack://channel?id=CA3P9NGA2&team=T5LNAMWNA
  license:
    name: Super Strict License
    url: https://opensource.org/licenses/super-strict-license

servers:
  - url: 'https://synthdata-arena-meldekort.dev.intern.nav.no/api/v1'

tags:
  - name: 'Syntetisering'
    externalDocs:
      description: Dokumentasjon
      url: 'https://navikt.github.io/testnorge-syntetiseringspakker/apps/arena/synt_meldekort/docs/Implementasjon.html'

paths:
  /meldekort/{meldegruppe}/{num_to_generate}:
    get:
      operationId: provider.controller.generate_data
      security:
        - jwt: [ 'secret' ]
      tags:
          - 'Syntetisering'
      summary: Trigger generering av meldekort
      parameters:
        - in: path
          name: meldegruppe
          required: true
          schema:
            "$ref": "#/components/schemas/MeldekortType"
          description: Meldegruppen som skal genereres
        - in: path
          name: num_to_generate
          schema:
            type: integer
          required: true
          description: Antall meldekort som skal genereres
        - in: query
          name: arbeidstimer
          schema:
            type: number
          required: false
          description: Verdi som overskriver arbeidstimer verdien i genererte meldekort
      responses:
        '200':
          description: Liste med meldekort på XML format
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
              examples:
                to-dagp-meldekort:
                  $ref: '#/components/examples/to-dagp-meldekort'

components:
  schemas:
    MeldekortType:
      enum:
        - ARBS
        - ATTF
        - INDIV
        - DAGP
        - FY
      type: string

  securitySchemes:
    jwt:
      type: http
      scheme: bearer
      bearerFormat: JWT
      x-bearerInfoFunc: libs.security.decode_token

