spring:
  security:
    oauth2:
      resourceserver:
        aad:
          issuer-uri: ${AZURE_OPENID_CONFIG_ISSUER}
          accepted-audience: ${AZURE_APP_CLIENT_ID}, api://${AZURE_APP_CLIENT_ID}

app:
  config:
    bucket: synthdata-meldekort-model-bucket
    models:
     - model_ARBS
     - model_ATTF
     #- model_DAGO # Old relic, not currently in use by the API.
     - model_DAGP
     - model_FY
     - model_INDIV
     #- model_LONN # Old relic, not currently in use by the API.
     #- model_PERM # Old relic, not currently in use by the API.






