springdoc:
  api-docs:
    version: OPENAPI_3_0
  show-actuator: false

logging:
  level:
    root: INFO
    no.nav.dolly: DEBUG

server:
  servlet:
    context-path: /
  shutdown: graceful

---
spring:
  config:
    activate:
      on-profile: prod
    import: "sm://"
  security:
    oauth2:
      resourceserver:
        aad:
          issuer-uri: ${AZURE_OPENID_CONFIG_ISSUER}
          accepted-audience: ${AZURE_APP_CLIENT_ID}, api://${AZURE_APP_CLIENT_ID}

app:
  config:
    bucket: synthdata-aap-model-bucket
    models:
      - AAP_115
      - AATFOR
      - AAUNGUFOR
      - FRI_MK
